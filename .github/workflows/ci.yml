name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  syntax_checks:
    name: Syntax Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: TextMate grammar parity
        run: node scripts/check-parity.js
      - name: Editor-support config parity
        run: node scripts/build-editor-support.js --check

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disable shallow clone for better analysis relevancy
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # The free SonarCloud plan locks every project to the built-in "Sonar way"
      # gate, which only fails on rating/coverage thresholds and so lets new
      # issues (e.g. a single code smell) through. Enforce "zero new issues"
      # ourselves: the scan above waits for analysis (sonar.qualitygate.wait),
      # so the new-issue count is queryable here.
      - name: Fail on new SonarCloud issues
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          measure=$(curl -sf -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=muxlang_mux-syntax-highlighting&pullRequest=${PR_NUMBER}&metricKeys=new_violations")
          # new_violations is a new-code metric, so the count lives under
          # period.value (or periods[].value on older responses), not value.
          count=$(printf '%s' "$measure" | jq -r '(.component.measures[0] // {}) as $m | $m.value // $m.period.value // $m.periods[0].value // "0"')
          echo "New SonarCloud issues on PR #${PR_NUMBER}: ${count}"
          if [ "${count:-0}" -gt 0 ]; then
            echo "::error::${count} new SonarCloud issue(s) introduced on this PR. See https://sonarcloud.io/project/issues?id=muxlang_mux-syntax-highlighting&pullRequest=${PR_NUMBER}&resolved=false&inNewCodePeriod=true"
            exit 1
          fi
