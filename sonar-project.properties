sonar.projectKey=muxlang_mux-syntax-highlighting
sonar.organization=muxlang
sonar.exclusions=**/node_modules/**,textmate-mux/source.mux.json,textmate-mux/vscode-language-mux/source.mux.json
# scripts/ generates the committed grammars/editor support; it is build tooling,
# not a shipped, unit-tested library. Keep it analyzed for issues but out of the
# coverage metric (the repo's product is the grammar data, not testable code).
sonar.coverage.exclusions=scripts/**
# Block on the quality gate: the scanner waits for server-side analysis and
# exits non-zero if the gate fails, so a failing gate fails CI (and local
# runs) instead of silently uploading. The gate's conditions are configured
# in SonarCloud (Quality Gates), not here.
sonar.qualitygate.wait=true
